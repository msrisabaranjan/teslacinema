<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>T / Cinema</title>
  <link rel="icon" href="images/miff4.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#000;
      --surface:rgba(255,255,255,0.05);
      --surface-active:rgba(227,25,55,0.12);
      --border:rgba(255,255,255,0.08);
      --border-em:rgba(255,255,255,0.16);
      --accent:#E31937;
      --accent-dim:rgba(227,25,55,0.15);
      --text:#fff;
      --muted:rgba(255,255,255,0.42);
      --muted2:rgba(255,255,255,0.18);
      --green:#22c55e;
      --red:#E31937;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{
      background:var(--bg);
      color:var(--text);
      font-family:'Outfit',system-ui,sans-serif;
      min-height:100vh;
      overflow-x:hidden;
    }

    /* ── TICKER ── */
    .ticker-bar{
      position:sticky;top:0;z-index:200;
      background:#080808;
      border-bottom:1px solid var(--border);
      overflow:hidden;
      height:44px;
      display:flex;align-items:center;
    }
    .ticker-label{
      flex-shrink:0;
      padding:0 16px;
      font-size:11px;font-weight:700;letter-spacing:.13em;
      color:var(--accent);
      border-right:1px solid var(--border);
      height:100%;display:flex;align-items:center;
      background:#080808;
      min-width:62px;justify-content:center;
    }
    .ticker-mask{flex:1;overflow:hidden;position:relative;}
    .ticker-mask::before,.ticker-mask::after{
      content:'';position:absolute;top:0;bottom:0;width:28px;z-index:10;pointer-events:none;
    }
    .ticker-mask::before{left:0;background:linear-gradient(to right,#080808,transparent);}
    .ticker-mask::after{right:0;background:linear-gradient(to left,#080808,transparent);}
    .ticker-track{
      display:flex;white-space:nowrap;
      will-change:transform;
    }
    .ticker-track:hover{animation-play-state:paused;}
    .t-item{
      display:inline-flex;align-items:center;gap:7px;
      padding:0 22px;
    }
    .t-sym{font-weight:700;font-size:13px;letter-spacing:.04em;color:rgba(255,255,255,0.65);}
    .t-price{font-size:13px;font-weight:500;color:#fff;}
    .t-chg{font-size:12px;font-weight:600;}
    .t-chg.up{color:var(--green);}
    .t-chg.dn{color:var(--red);}
    .t-dot{color:var(--muted2);font-size:10px;}

    /* ── HEADER ── */
    header{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 24px;
      border-bottom:1px solid var(--border);
    }
    .logo{display:flex;align-items:center;gap:12px;}
    .logo-t{
      width:32px;height:32px;background:var(--accent);border-radius:6px;
      display:flex;align-items:center;justify-content:center;
      font-weight:800;font-size:16px;color:#fff;letter-spacing:-.02em;
    }
    .logo-name{font-size:18px;font-weight:600;letter-spacing:-.02em;}
    .logo-name span{color:var(--muted);font-weight:300;margin-left:5px;}
    .header-right{display:flex;align-items:center;gap:16px;}
    #clock{
      font-size:26px;font-weight:300;letter-spacing:-.02em;
      font-variant-numeric:tabular-nums;
    }
    .fs-btn{
      width:36px;height:36px;border-radius:8px;
      border:1px solid var(--border-em);background:transparent;
      color:var(--muted);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .15s,border-color .15s,color .15s;
      flex-shrink:0;
    }
    .fs-btn:active{background:var(--accent-dim);border-color:var(--accent);color:#fff;}
    .fs-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}

    /* ── NEWS STRIP ── */
    .news-strip{
      margin:14px 20px;
      border:1px solid var(--border);border-radius:12px;
      overflow:hidden;background:var(--surface);
    }
    .news-header{
      display:flex;align-items:center;gap:8px;
      padding:8px 14px;border-bottom:1px solid var(--border);
    }
    .news-label{
      font-size:10px;font-weight:700;letter-spacing:.14em;
      text-transform:uppercase;color:var(--accent);
    }
    .news-source{font-size:10px;font-weight:500;letter-spacing:.06em;color:var(--muted);}
    .news-dot{color:var(--muted2);font-size:9px;margin:0 1px;}
    .news-updated{margin-left:auto;font-size:10px;color:var(--muted2);font-variant-numeric:tabular-nums;}
    .news-items{overflow:hidden;position:relative;height:42px;}
    .news-slide{
      position:absolute;inset:0;
      display:flex;align-items:center;
      padding:0 16px;gap:12px;
      opacity:0;transform:translateY(8px);
      transition:opacity .45s ease,transform .45s ease;
      pointer-events:none;
    }
    .news-slide.active{opacity:1;transform:translateY(0);pointer-events:auto;cursor:pointer;}
    .news-slide.exit{opacity:0;transform:translateY(-8px);}
    .news-idx{font-size:10px;font-weight:700;color:var(--accent);flex-shrink:0;font-variant-numeric:tabular-nums;}
    .news-title{
      font-size:13px;font-weight:400;color:rgba(255,255,255,0.8);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
    }
    .news-time{flex-shrink:0;font-size:11px;color:var(--muted2);font-variant-numeric:tabular-nums;}
    .news-dots{
      display:flex;gap:5px;padding:7px 14px;
      border-top:1px solid var(--border);align-items:center;
    }
    .news-pip{
      width:16px;height:2px;border-radius:1px;
      background:var(--border-em);
      transition:background .3s,width .3s;cursor:pointer;
    }
    .news-pip.on{background:var(--accent);width:22px;}
    .news-skeleton{
      height:42px;display:flex;align-items:center;
      padding:0 16px;gap:10px;
    }
    .news-skel-bar{
      height:10px;border-radius:4px;
      background:rgba(255,255,255,0.07);
      animation:pulse .9s ease infinite;
    }
    @keyframes pulse{0%,100%{opacity:.35}50%{opacity:.8}}

    /* ── SECTIONS ── */
    main{padding:4px 0 48px;}
    section{margin:18px 0;}
    .sec-head{
      display:flex;align-items:center;gap:10px;
      padding:0 20px 10px;
    }
    .sec-head::before{
      content:'';width:3px;height:15px;
      background:var(--accent);border-radius:2px;flex-shrink:0;
    }
    .sec-head span{
      font-size:12px;font-weight:700;letter-spacing:.13em;
      text-transform:uppercase;color:var(--muted);
    }
    .sec-head::after{content:'';flex:1;height:1px;background:var(--border);}

    /* ── HORIZONTAL SCROLL ROW ── */
    .row{
      display:flex;
      gap:12px;
      padding:0 20px 4px;
      overflow-x:auto;
      overflow-y:visible;
      scroll-snap-type:x mandatory;
      scroll-padding-left:20px;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }
    .row::-webkit-scrollbar{display:none;}

    /* ── CARD ── */
    .card{
      flex:0 0 auto;
      width:158px;
      height:148px;
      border-radius:14px;
      background:var(--surface);
      border:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      scroll-snap-align:start;
      transition:background .12s,border-color .12s,transform .1s;
      opacity:0;
      animation:fadeUp .5s ease forwards;
      user-select:none;
      position:relative;
      overflow:hidden;
    }
    .card::before{
      content:'';position:absolute;
      top:0;left:0;right:0;height:1px;
      background:rgba(255,255,255,0.08);
    }
    .card:active{
      transform:scale(0.93);
      background:var(--surface-active);
      border-color:rgba(227,25,55,0.45);
    }
    .card img{
      max-width:74%;max-height:60%;
      object-fit:contain;pointer-events:none;
      transition:opacity .12s;
    }
    .card:active img{opacity:.8;}

    /* stagger animation */
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
    .row .card{transform:translateY(12px);}
    .row .card:nth-child(1){animation-delay:.04s}
    .row .card:nth-child(2){animation-delay:.09s}
    .row .card:nth-child(3){animation-delay:.14s}
    .row .card:nth-child(4){animation-delay:.19s}
    .row .card:nth-child(5){animation-delay:.24s}
    .row .card:nth-child(6){animation-delay:.29s}
    .row .card:nth-child(7){animation-delay:.34s}
    .row .card:nth-child(8){animation-delay:.39s}
    .row .card:nth-child(9){animation-delay:.44s}
    .row .card:nth-child(10){animation-delay:.49s}

    /* ── RADIO CARDS ── */
    .radio-card{
      flex:0 0 auto;
      width:158px;
      height:148px;
      border-radius:14px;
      background:var(--surface);
      border:1px solid var(--border);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:9px;
      cursor:pointer;
      scroll-snap-align:start;
      transition:background .15s,border-color .15s,transform .1s;
      opacity:0;
      animation:fadeUp .5s ease forwards;
      user-select:none;
      position:relative;
      overflow:hidden;
    }
    .radio-card::before{
      content:'';position:absolute;
      top:0;left:0;right:0;height:1px;
      background:rgba(255,255,255,0.08);
    }
    .radio-card.playing{
      border-color:rgba(227,25,55,0.55);
      background:rgba(227,25,55,0.08);
    }
    .radio-card:active{transform:scale(0.93);}
    .radio-icon{
      width:52px;height:52px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:700;letter-spacing:.04em;
      flex-shrink:0;
      position:relative;
    }
    /* pulse ring when playing */
    .radio-card.playing .radio-icon::after{
      content:'';
      position:absolute;inset:-5px;border-radius:50%;
      border:2px solid var(--accent);
      opacity:.5;
      animation:ping 1.4s ease-out infinite;
    }
    @keyframes ping{
      0%{transform:scale(1);opacity:.5}
      100%{transform:scale(1.35);opacity:0}
    }
    .radio-name{
      font-size:12px;font-weight:600;
      color:#fff;text-align:center;
      max-width:88%;white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis;
      pointer-events:none;
    }
    .radio-genre{
      font-size:10px;font-weight:400;
      color:var(--muted);text-align:center;
      pointer-events:none;
    }

    /* ── NOW PLAYING BAR ── */
    .now-playing{
      position:fixed;
      bottom:0;left:0;right:0;
      z-index:300;
      background:#0e0e0e;
      border-top:1px solid var(--border);
      display:none;
      align-items:center;
      gap:14px;
      padding:10px 20px;
      min-height:58px;
    }
    .now-playing.visible{display:flex;}
    /* when an iframe stream is active, taller to fit the player */
    .now-playing.has-frame{
      align-items:flex-start;
      padding:10px 20px;
      gap:16px;
    }
    .np-pulse{
      width:10px;height:10px;border-radius:50%;
      background:var(--accent);flex-shrink:0;
      margin-top:2px;
      animation:ping 1.4s ease-out infinite;
    }
    .now-playing.has-frame .np-pulse{margin-top:6px;}
    .np-info{flex:1;min-width:0;}
    .np-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .np-genre{font-size:11px;color:var(--muted);margin-top:1px;}
    /* mini embedded player shown inside the bar */
    .np-frame-wrap{
      flex-shrink:0;
      width:160px;height:90px;
      border-radius:8px;
      overflow:hidden;
      border:1px solid var(--border-em);
      display:none;
      background:#000;
    }
    .now-playing.has-frame .np-frame-wrap{display:block;}
    .np-frame-wrap iframe{
      width:100%;height:100%;
      border:none;display:block;
    }
    .np-stop{
      flex-shrink:0;
      width:36px;height:36px;border-radius:50%;
      background:var(--accent);border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .15s,transform .1s;
      align-self:center;
    }
    .np-stop:active{transform:scale(0.9);}
    .np-stop svg{width:12px;height:12px;fill:#fff;}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border-em);border-radius:2px}
  </style>
</head>
<body>

  <!-- STOCK TICKER -->
  <div class="ticker-bar">
    <div class="ticker-label" id="tickerLabel">LIVE</div>
    <div class="ticker-mask">
      <div class="ticker-track" id="tickerTrack">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-t">T</div>
      <div class="logo-name">Cinema<span>/ Drive</span></div>
    </div>
    <div class="header-right">
      <div id="clock">--:--</div>
      <button class="fs-btn" id="fsBtn" title="Fullscreen">
        <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
    </div>
  </header>

  <!-- CONTENT -->
  <main>

    <!-- NEWS STRIP -->
    <div class="news-strip" id="newsStrip" style="margin:14px 20px 0;">
      <div class="news-header">
        <span class="news-label">News</span>
        <span class="news-dot">·</span>
        <span class="news-source">BBC Top Headlines</span>
        <span class="news-updated" id="newsUpdated"></span>
      </div>
      <div class="news-items" id="newsItems">
        <div class="news-skeleton">
          <div class="news-skel-bar" style="width:28px"></div>
          <div class="news-skel-bar" style="width:68%;animation-delay:.15s"></div>
          <div class="news-skel-bar" style="width:36px;margin-left:auto;animation-delay:.3s"></div>
        </div>
      </div>
      <div class="news-dots" id="newsDots"></div>
    </div>

    <section>
      <div class="sec-head"><span>Streaming</span></div>
      <div class="row" id="streaming"></div>
    </section>
    <section>
      <div class="sec-head"><span>Music</span></div>
      <div class="row" id="music"></div>
    </section>
    <section>
      <div class="sec-head"><span>Apps &amp; Tools</span></div>
      <div class="row" id="tools"></div>
    </section>
    <section>
      <div class="sec-head"><span>Radio</span></div>
      <div class="row" id="radio"></div>
    </section>
  </main>

  <!-- NOW PLAYING BAR -->
  <div class="now-playing" id="nowPlaying">
    <div class="np-pulse"></div>
    <div class="np-info">
      <div class="np-name" id="npName">—</div>
      <div class="np-genre" id="npGenre">Live Radio</div>
    </div>
    <div class="np-frame-wrap" id="npFrameWrap">
      <iframe id="npFrame" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
    </div>
    <button class="np-stop" id="npStop" title="Stop">
      <svg viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="1"/></svg>
    </button>
  </div>

<script>
/* ── DATA ── */
const STREAMING = [
  {name:'Netflix',    url:'https://www.netflix.com',                    img:'https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg'},
  {name:'YouTube',    url:'https://www.youtube.com',                    img:'https://upload.wikimedia.org/wikipedia/commons/4/42/YouTube_icon_%282013-2017%29.png'},
  {name:'Hulu',       url:'https://www.hulu.com',                       img:'https://upload.wikimedia.org/wikipedia/commons/0/0f/Hulu_Japan_green_logo.svg'},
  {name:'Disney+',    url:'https://www.disneyplus.com',                 img:'https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg'},
  {name:'Crunchyroll',url:'https://www.crunchyroll.com',                img:'https://upload.wikimedia.org/wikipedia/commons/d/d9/Crunchyroll_2024.svg'},
  {name:'Max',        url:'https://www.max.com',                        img:'https://upload.wikimedia.org/wikipedia/commons/1/17/HBO_Max_Logo.svg'},
  {name:'Plex',       url:'https://app.plex.tv',                        img:'https://upload.wikimedia.org/wikipedia/commons/3/34/Plex_logo_2022_full_color_on_black.png'},
  {name:'Prime Video',url:'https://www.amazon.com/gp/video/storefront', img:'https://upload.wikimedia.org/wikipedia/commons/4/43/Amazon_Prime_Video_logo_%282022%29.svg'},
  {name:'Anime Kai',  url:'https://animekai.to/home',                   img:'https://upload.wikimedia.org/wikipedia/commons/1/12/ANIME%2B_logo.svg'},
  {name:'Movhub',     url:'https://movhub.ws/home',                     img:'https://upload.wikimedia.org/wikipedia/commons/2/20/Movies_logo.png'}
];
const MUSIC = [
  {name:'Spotify',     url:'https://open.spotify.com',  img:'https://upload.wikimedia.org/wikipedia/commons/2/24/Spotify_New_Full_Logo_RGB_Green.png'},
  {name:'Apple Music', url:'https://music.apple.com',   img:'https://upload.wikimedia.org/wikipedia/commons/9/9e/Itunes-music-app-icon.png'},
  {name:'SoundCloud',  url:'https://soundcloud.com',    img:'https://upload.wikimedia.org/wikipedia/commons/7/78/Soundcloud_logo.svg'}
];
const TOOLS = [
  {name:'Twitch',        url:'https://www.twitch.tv',                  img:'https://upload.wikimedia.org/wikipedia/commons/2/26/Twitch_logo.svg'},
  {name:'Kick',          url:'https://kick.com',                       img:'https://upload.wikimedia.org/wikipedia/commons/d/dd/Kick_logo.svg'},
  {name:'TikTok',        url:'https://www.tiktok.com',                 img:'https://upload.wikimedia.org/wikipedia/commons/c/c3/Tiktok_logo_text_White.jpg'},
  {name:'Reddit',        url:'https://www.reddit.com',                 img:'https://upload.wikimedia.org/wikipedia/commons/2/2f/Reddit_wordmark.svg'},
  {name:'Google Photos', url:'https://photos.google.com',              img:'https://upload.wikimedia.org/wikipedia/commons/6/60/Google_Photos_icon_%282015-2020%29.svg'},
  {name:'Google Drive',  url:'https://drive.google.com',               img:'https://upload.wikimedia.org/wikipedia/commons/f/fb/Google_Drive_-_New_Logo.png'},
  {name:'Xbox',          url:'https://www.xbox.com/en-US/play',        img:'https://upload.wikimedia.org/wikipedia/commons/8/8c/XBOX_logo_2012.svg'},
  {name:'Discord',       url:'https://discord.com/login',              img:'https://upload.wikimedia.org/wikipedia/commons/7/73/Discord_Color_Text_Logo_%282015-2021%29.svg'}
];

/* ── RENDER CARDS ── */
function renderCards(list, containerId){
  const container = document.getElementById(containerId);
  list.forEach(s => {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `<img src="${s.img}" alt="${s.name}" loading="lazy"/>`;
    el.addEventListener('click', () => openUrl(s.url));
    container.appendChild(el);
  });
}

function openUrl(url){
  if(document.fullscreenEnabled && !document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{}).finally(()=> window.location.href = url);
  } else {
    window.location.href = url;
  }
}

/* ── CLOCK ── */
function updateClock(){
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}`;
}
updateClock();
setInterval(updateClock, 15000);

/* ── FULLSCREEN ── */
/* Tesla's browser does not honour requestFullscreen().
   The trick: navigate to a youtube.com/redirect URL pointing back to this
   page — Tesla intercepts it and opens the destination in fullscreen theater mode. */
const THIS_URL = 'https://msrisabaranjan.github.io/teslacinema/';
const FS_URL   = 'https://www.youtube.com/redirect?q=' + encodeURIComponent(THIS_URL);
document.getElementById('fsBtn').addEventListener('click', () => {
  window.location.href = FS_URL;
});

/* ── STOCK TICKER ── */
const STOCK_SYMS  = ['TSLA','AMD','NVDA','AMZN','GOOGL','META','NIO'];
const CRYPTO_IDS  = {'BTC-USD':'bitcoin','LTC-USD':'litecoin'};
const ALL_SYMS    = [...STOCK_SYMS,'BTC-USD','LTC-USD'];

const MOCK = {
  TSLA:     {price:248.23, change:+3.21,  pct:+1.31, closed:false},
  AMD:      {price:96.54,  change:-1.12,  pct:-1.15, closed:false},
  NVDA:     {price:110.72, change:+2.44,  pct:+2.25, closed:false},
  AMZN:     {price:195.22, change:-0.88,  pct:-0.45, closed:false},
  GOOGL:    {price:161.51, change:+1.23,  pct:+0.77, closed:false},
  META:     {price:512.83, change:+8.91,  pct:+1.77, closed:false},
  NIO:      {price:3.87,   change:+0.12,  pct:+3.20, closed:false},
  'BTC-USD':{price:84510,  change:+1240,  pct:+1.49, closed:false},
  'LTC-USD':{price:84.31,  change:+2.14,  pct:+2.61, closed:false},
};

let stockData = Object.assign({}, MOCK);
const PROXY = 'https://api.allorigins.win/raw?url=';

function fmtPrice(sym, p){
  if(sym === 'BTC-USD') return '$' + Math.round(p).toLocaleString('en-US');
  return '$' + p.toFixed(2);
}

function buildTickerHTML(){
  return ALL_SYMS.map(sym => {
    const d   = stockData[sym];
    const up  = d.change >= 0;
    const sign= up ? '+' : '';
    const cls = up ? 'up' : 'dn';
    const closedTag = d.closed ? `<span style="font-size:8px;color:var(--muted2);margin-left:2px">CLOSE</span>` : '';
    return `<span class="t-item">
      <span class="t-sym">${sym}</span>
      <span class="t-price">${fmtPrice(sym, d.price)}</span>${closedTag}
      <span class="t-chg ${cls}">${sign}${d.change.toFixed(2)} (${sign}${d.pct.toFixed(2)}%)</span>
    </span><span class="t-dot">•</span>`;
  }).join('');
}

/* ── JS INFINITE TICKER ── */
/* Render 4 copies so content is always wider than viewport at any size.
   RAF loop shifts translateX by px/frame; when we've scrolled one copy's
   width we snap back to 0 — perfectly seamless regardless of window size. */
const TICKER_PX_PER_SEC = 60; // scroll speed
let tickerX   = 0;
let tickerW   = 0; // width of ONE copy of the content
let tickerLast= null;
let tickerPaused = false;
let tickerRAF = null;

function buildTickerContent(){
  const track = document.getElementById('tickerTrack');
  const html  = buildTickerHTML();
  // 4 identical copies — guarantees seamless loop at any viewport width
  track.innerHTML = html + html + html + html;
  // measure after next paint so layout is complete
  requestAnimationFrame(() => {
    tickerW = track.scrollWidth / 4;
    tickerX = 0;
    track.style.transform = 'translateX(0px)';
  });
}

function tickerStep(ts){
  if(tickerLast === null) tickerLast = ts;
  const dt = (ts - tickerLast) / 1000;
  tickerLast = ts;
  if(!tickerPaused && tickerW > 0){
    tickerX += TICKER_PX_PER_SEC * dt;
    if(tickerX >= tickerW) tickerX -= tickerW; // seamless reset
    document.getElementById('tickerTrack').style.transform = `translateX(-${tickerX.toFixed(2)}px)`;
  }
  tickerRAF = requestAnimationFrame(tickerStep);
}

function renderTicker(){
  buildTickerContent();
}

// pause on touch-hold
const tickerEl = document.getElementById('tickerTrack');
tickerEl.addEventListener('touchstart', ()=>{ tickerPaused=true; }, {passive:true});
tickerEl.addEventListener('touchend',   ()=>{ tickerPaused=false; });
tickerEl.addEventListener('mouseenter', ()=>{ tickerPaused=true; });
tickerEl.addEventListener('mouseleave', ()=>{ tickerPaused=false; });

// re-measure on resize so tickerW stays accurate
window.addEventListener('resize', () => {
  const track = document.getElementById('tickerTrack');
  tickerW = track.scrollWidth / 4;
  if(tickerX >= tickerW) tickerX = tickerX % tickerW;
});

requestAnimationFrame(tickerStep);

/* Fetch one stock from Yahoo Finance via allorigins */
async function fetchYahoo(sym){
  const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d`;
  const res   = await fetch(PROXY + encodeURIComponent(yfUrl), {signal: AbortSignal.timeout(10000)});
  if(!res.ok) throw new Error('proxy fail');
  const json  = await res.json();
  const meta  = json.chart.result[0].meta;
  const state = (meta.marketState || '').toUpperCase();
  const isOpen= state === 'REGULAR';
  // When market closed use regularMarketPrice (last close); change vs previousClose
  const price = meta.regularMarketPrice;
  const prev  = meta.previousClose || meta.chartPreviousClose || price;
  const change= +(price - prev).toFixed(4);
  const pct   = +((change / prev) * 100).toFixed(4);
  return {price, change, pct, closed: !isOpen};
}

/* Fetch BTC + LTC from CoinGecko (CORS-open, no key needed) */
async function fetchCrypto(){
  const ids = Object.values(CRYPTO_IDS).join(',');
  const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`;
  const res = await fetch(url, {signal: AbortSignal.timeout(10000)});
  if(!res.ok) throw new Error('coingecko fail');
  const data = await res.json();
  const out  = {};
  Object.entries(CRYPTO_IDS).forEach(([sym, id]) => {
    if(!data[id]) return;
    const price = data[id].usd;
    const pct   = +(data[id].usd_24h_change || 0).toFixed(2);
    const change= +(price * pct / 100).toFixed(2);
    out[sym]    = {price, change, pct, closed: false};
  });
  return out;
}

/* Update ticker label to LIVE / CLOSED based on market state */
function setTickerState(anyClosed){
  const lbl = document.getElementById('tickerLabel');
  if(!lbl) return;
  if(anyClosed){
    lbl.textContent = 'CLOSED';
    lbl.style.color = 'var(--muted)';
  } else {
    lbl.textContent = 'LIVE';
    lbl.style.color = 'var(--accent)';
  }
}

async function refreshStocks(){
  let anyClosed = false;
  /* Stocks — fetch in parallel, keep mock on failure */
  const stockResults = await Promise.allSettled(
    STOCK_SYMS.map(sym => fetchYahoo(sym).then(d => ({sym, d})))
  );
  stockResults.forEach(r => {
    if(r.status === 'fulfilled' && r.value?.d){
      stockData[r.value.sym] = r.value.d;
      if(r.value.d.closed) anyClosed = true;
    }
  });

  /* Crypto */
  try {
    const crypto = await fetchCrypto();
    Object.assign(stockData, crypto);
  } catch(_){}

  setTickerState(anyClosed);
  renderTicker();
}

renderTicker();
refreshStocks();
setInterval(refreshStocks, 90000);

/* ── NEWS STRIP ── */
let newsItems = [];
let newsIdx   = 0;
let newsTimer = null;

function timeAgo(dateStr){
  const diff = (Date.now() - new Date(dateStr).getTime()) / 60000;
  if(isNaN(diff) || diff < 0) return '';
  if(diff < 1)    return 'just now';
  if(diff < 60)   return Math.round(diff) + 'm ago';
  if(diff < 1440) return Math.round(diff / 60) + 'h ago';
  return Math.round(diff / 1440) + 'd ago';
}

function renderNewsItems(){
  const container = document.getElementById('newsItems');
  const dots      = document.getElementById('newsDots');
  if(!container || !dots) return;
  container.innerHTML = '';
  dots.innerHTML      = '';
  newsItems.forEach((item, i) => {
    const slide = document.createElement('div');
    slide.className = 'news-slide' + (i === 0 ? ' active' : '');
    const t = (item.title || '').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#39;/g,"'").replace(/&quot;/g,'"');
    slide.innerHTML = `<span class="news-idx">${String(i+1).padStart(2,'0')}</span><span class="news-title">${t}</span><span class="news-time">${timeAgo(item.pubDate)}</span>`;
    if(item.link) slide.addEventListener('click', () => window.open(item.link, '_blank'));
    container.appendChild(slide);

    const pip = document.createElement('div');
    pip.className = 'news-pip' + (i === 0 ? ' on' : '');
    pip.addEventListener('click', () => goToNews(i));
    dots.appendChild(pip);
  });
  clearInterval(newsTimer);
  newsTimer = setInterval(advanceNews, 6000);
}

function goToNews(next){
  const slides = document.querySelectorAll('.news-slide');
  const pips   = document.querySelectorAll('.news-pip');
  if(!slides.length) return;
  const prev = newsIdx;
  newsIdx = next;
  slides[prev].classList.remove('active');
  slides[prev].classList.add('exit');
  setTimeout(()=>{ if(slides[prev]) slides[prev].classList.remove('exit'); }, 550);
  pips[prev] && pips[prev].classList.remove('on');
  slides[newsIdx] && slides[newsIdx].classList.add('active');
  pips[newsIdx]   && pips[newsIdx].classList.add('on');
}

function advanceNews(){
  if(!newsItems.length) return;
  goToNews((newsIdx + 1) % newsItems.length);
}

/* Parse BBC RSS XML fetched via allorigins */
async function fetchNews(){
  const RSS = 'https://feeds.bbci.co.uk/news/rss.xml';
  try {
    const res  = await fetch(PROXY + encodeURIComponent(RSS), {signal: AbortSignal.timeout(10000)});
    if(!res.ok) throw new Error('fetch fail');
    const text   = await res.text();
    const parser = new DOMParser();
    const doc    = parser.parseFromString(text, 'text/xml');
    const items  = Array.from(doc.querySelectorAll('item')).slice(0, 14);
    if(!items.length) throw new Error('no items');
    newsItems = items.map(el => {
      /* BBC RSS uses <link> as a text node AFTER the <title> node */
      const title   = el.querySelector('title')?.textContent?.trim() || '';
      const pubDate = el.querySelector('pubDate')?.textContent?.trim() || '';
      /* <link> in BBC RSS is a sibling text node, not an attribute */
      let link = '';
      el.childNodes.forEach(n => { if(n.nodeName === 'link') link = n.textContent?.trim() || ''; });
      if(!link) link = el.querySelector('guid')?.textContent?.trim() || '';
      return {title, pubDate, link};
    }).filter(i => i.title && !i.title.toLowerCase().includes('bbc'));

    renderNewsItems();
    const el = document.getElementById('newsUpdated');
    if(el){
      const now = new Date();
      el.textContent = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    }
  } catch(err){
    console.warn('News fetch failed:', err);
    /* retry silently — leave skeleton or last good data in place */
  }
}

fetchNews();
setInterval(fetchNews, 5 * 60 * 1000);

let radioAudio      = null;
let activeRadioCard = null;

function stopRadio(){
  if(radioAudio){
    radioAudio.pause();
    radioAudio.src = '';
    radioAudio = null;
  }
  /* Kill iframe by clearing src — stops all audio/video */
  npFrame.src = '';
  npEl.classList.remove('visible','has-frame');
  if(activeRadioCard){
    activeRadioCard.classList.remove('playing');
    activeRadioCard = null;
  }
}

function playStation(station, cardEl){
  if(station.type === 'link'){
    openUrl(station.url);
    return;
  }
  if(activeRadioCard === cardEl){ stopRadio(); return; }
  stopRadio();

  if(station.type === 'audio'){
    radioAudio = new Audio(station.stream);
    radioAudio.crossOrigin = 'anonymous';
    radioAudio.play().catch(()=>{});
    npEl.classList.add('visible');
    npEl.classList.remove('has-frame');
  } else {
    npFrame.src = station.embedUrl;
    npEl.classList.add('visible','has-frame');
  }

  cardEl.classList.add('playing');
  activeRadioCard = cardEl;
  npNameEl.textContent  = station.name;
  npGenreEl.textContent = station.genre;
}

function renderRadio(){
  const container = document.getElementById('radio');
  RADIO_STATIONS.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'radio-card';
    el.style.animationDelay = (0.04 + i * 0.05) + 's';
    el.innerHTML = `
      <div class="radio-icon" style="background:${s.color};color:${s.text}">${s.initials}</div>
      <div class="radio-name">${s.name}</div>
      <div class="radio-genre">${s.genre}</div>`;
    el.addEventListener('click', () => playStation(s, el));
    container.appendChild(el);
  });
}
